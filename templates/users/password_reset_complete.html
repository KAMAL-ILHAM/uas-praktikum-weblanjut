<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesai - EIO Master</title>
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Base Layout */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Main Container */
        .login-card { 
            background: white; 
            width: 100%; 
            min-height: 100vh; 
            border-radius: 0; 
            box-shadow: none; 
        }
        
        /* Left Sidebar: Branding */
        .bg-purple-gradient { 
            background: linear-gradient(135deg, #7c5cff, #6441f1); 
            color: white; 
            padding: 4rem; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        .logo-title { 
            font-size: 2.2rem; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            margin-bottom: 1rem; 
        }
        
        .logo-title i { 
            font-size: 2.5rem; 
            margin-right: 15px; 
        }
        
        /* Right Sidebar: Form Section */
        .form-section { 
            padding: 3rem 4rem; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        
        .top-icon-success { 
            background: #ecfdf5; 
            color: #10b981; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem; 
            margin: 0 auto 1.5rem; 
            border: 2px solid #a7f3d0; 
        }
        
        /* Buttons */
        .btn-ungu { 
            background: linear-gradient(135deg, #8160ff, #6441f1); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 12px; 
            font-weight: 600; 
            width: 100%; 
            text-decoration: none; 
            display: inline-block; 
            text-align: center; 
            margin-top: 1rem; 
        }
    </style>
</head>
<body>

    <div class="row login-card mx-0">
        
        <!-- Left Sidebar: Branding -->
        <div class="col-md-5 bg-purple-gradient d-none d-md-flex">
            <div class="logo-title">
                <i class="bi bi-layers-fill"></i> EIO Master
            </div>
            <p class="opacity-90">
                Keamanan akun Anda adalah prioritas kami. Password Anda kini telah diperbarui.
            </p>
        </div>

        <!-- Right Sidebar: Success Message -->
        <div class="col-md-7 form-section">
            <div class="w-100 text-center" style="max-width: 400px; margin: 0 auto;">
                
                <div class="top-icon-success">
                    <i class="bi bi-check-all"></i>
                </div>
                
                <h3 class="fw-bold mb-3">Selesai!</h3>
                <p class="text-muted mb-4">
                    Kata sandi Anda telah berhasil diatur ulang. Sekarang Anda dapat masuk kembali ke dashboard EIO Master.
                </p>
                
                <a href="{% url 'users:login' %}" class="btn-ungu">Login Sekarang</a>
                
            </div>
        </div>
        
    </div>

</body>
</html>
