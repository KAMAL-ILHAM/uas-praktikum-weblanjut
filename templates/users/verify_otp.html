<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan - EIO Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .otp-card { 
            background: white; 
            padding: 3rem 2rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            width: 100%; 
            max-width: 400px; 
        }
        .icon-lock { 
            font-size: 3.5rem; 
            color: #6441f1; 
            margin-bottom: 10px; 
        }
        .form-control-custom { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 2px solid #e2e8f0; 
            text-align: center; 
            font-size: 1.8rem; 
            letter-spacing: 8px; 
            font-weight: 800; 
            color: #1e293b; 
            outline: none; 
            transition: 0.2s;
        }
        .form-control-custom:focus { 
            border-color: #7c5cff; 
            box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.1); 
        }
        .form-control-custom::placeholder {
            color: #cbd5e1;
        }
        .btn-ungu { 
            background: linear-gradient(135deg, #8160ff, #6441f1); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            padding: 14px; 
            font-weight: 700; 
            font-size: 1rem;
            width: 100%; 
            margin-top: 1.5rem; 
            transition: 0.2s;
        }
        .btn-ungu:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 15px rgba(100, 65, 241, 0.3); 
        }
    </style>
</head>
<body>

    <div class="otp-card text-center">
        <i class="bi bi-shield-lock-fill icon-lock"></i>
        <h3 class="fw-bold mb-2">Verifikasi 2 Langkah</h3>
        <p class="text-muted mb-4" style="font-size: 0.9rem;">
            Masukkan 6 digit kode keamanan yang baru saja kami kirimkan ke email Anda.
        </p>
        
        <!-- Pesan Error/Sukses -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} py-2" style="font-size: 0.85rem; border-radius: 8px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Form OTP -->
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="otp_code" class="form-control-custom" placeholder="------" maxlength="6" required autocomplete="off">
            <button type="submit" class="btn-ungu">Verifikasi & Masuk</button>
        </form>

        <div class="mt-4">
            <a href="{% url 'users:login' %}" class="text-decoration-none" style="color: #64748b; font-size: 0.85rem; font-weight: 600;">
                <i class="bi bi-arrow-left"></i> Kembali ke Halaman Login
            </a>
        </div>
    </div>

</body>
</html>
